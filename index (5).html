<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Wingo Live Result</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #05080f;
  --bg2:   #080c17;
  --bg3:   #0d1220;
  --card:  #0a0f1c;
  --bd:    #131f35;
  --red:   #ff3b5c;
  --green: #00d68f;
  --vio:   #a855f7;
  --gold:  #f7c948;
  --blue:  #2AABEE;
  --tx:    #dce6f2;
  --mu:    #3d5a78;
  --fH:    'Syne', sans-serif;
  --fM:    'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--tx);
  font-family: var(--fM);
  min-height: 100vh;
  overflow-x: hidden;
}

/* animated bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168,85,247,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 0% 100%, rgba(255,59,92,.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 100% 100%, rgba(0,214,143,.06) 0%, transparent 50%);
}

.container { max-width: 680px; margin: 0 auto; padding: 0 16px 40px; position: relative; z-index: 1; }

/* ── HEADER ───────────────────────── */
.header {
  text-align: center;
  padding: 30px 0 20px;
}
.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 6px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--vio), var(--blue));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.logo-text {
  font-family: var(--fH);
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-sub {
  font-size: 12px;
  color: var(--mu);
  letter-spacing: .1em;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,59,92,.1);
  border: 1px solid rgba(255,59,92,.3);
  color: var(--red);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--fH);
  margin-top: 10px;
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── COUNTDOWN ────────────────────── */
.countdown-card {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.countdown-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--red), var(--vio), var(--green));
  animation: slide 2s linear infinite;
}
@keyframes slide { from{background-position:0%} to{background-position:200%} }

.period-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.period-label { font-size: 11px; color: var(--mu); text-transform: uppercase; letter-spacing: .1em; }
.period-val {
  font-family: var(--fH);
  font-size: 13px;
  color: var(--gold);
  font-weight: 700;
}
.source-tag {
  font-size: 10px;
  color: var(--mu);
  background: var(--bg3);
  border: 1px solid var(--bd);
  padding: 2px 8px;
  border-radius: 4px;
}

.timer-wrap { margin-bottom: 16px; }
.timer-num {
  font-family: var(--fH);
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  transition: all .3s;
}
.timer-num.urgent {
  background: linear-gradient(135deg, var(--red), #ff8c42);
  -webkit-background-clip: text;
}
.timer-label { font-size: 11px; color: var(--mu); letter-spacing: .15em; margin-top: 4px; }

/* progress bar */
.progress-wrap { background: var(--bg3); border-radius: 4px; height: 4px; overflow: hidden; }
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s linear, background .3s;
  background: linear-gradient(90deg, var(--green), var(--blue));
}
.progress-fill.urgent { background: linear-gradient(90deg, var(--red), #ff8c42); }

/* ── LATEST RESULT ─────────────────── */
.latest-card {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  animation: up .4s ease;
}
@keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

.section-title {
  font-family: var(--fH);
  font-size: 11px;
  font-weight: 700;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bd);
}

.latest-main {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
}
/* big number ball */
.big-ball {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--fH);
  font-size: 42px;
  font-weight: 900;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 0 30px currentColor;
  animation: pop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from{transform:scale(.6)} to{transform:scale(1)} }

.big-ball.red    { background:linear-gradient(135deg,#ff3b5c,#ff6b35); color:#fff; }
.big-ball.green  { background:linear-gradient(135deg,#00d68f,#00b894); color:#000; }
.big-ball.violet { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; }
.big-ball.vio-red   { background:linear-gradient(135deg,#ff3b5c 50%,#a855f7 50%); color:#fff; }
.big-ball.vio-green { background:linear-gradient(135deg,#00d68f 50%,#a855f7 50%); color:#000; }

.latest-info { flex: 1; }
.latest-period { font-size: 11px; color: var(--mu); margin-bottom: 8px; }

.colour-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.pill {
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: var(--fH);
  font-weight: 700;
}
.pill.red    { background:rgba(255,59,92,.15);  border:1px solid rgba(255,59,92,.4);  color:var(--red);   }
.pill.green  { background:rgba(0,214,143,.15);  border:1px solid rgba(0,214,143,.4);  color:var(--green); }
.pill.violet { background:rgba(168,85,247,.15); border:1px solid rgba(168,85,247,.4); color:var(--vio);   }
.pill.big    { background:rgba(247,201,72,.1);  border:1px solid rgba(247,201,72,.3); color:var(--gold);  }
.pill.small  { background:rgba(42,171,238,.1);  border:1px solid rgba(42,171,238,.3); color:var(--blue);  }
.pill.odd    { background:rgba(255,59,92,.08);  border:1px solid rgba(255,59,92,.2);  color:var(--red);   }
.pill.even   { background:rgba(0,214,143,.08);  border:1px solid rgba(0,214,143,.2);  color:var(--green); }

/* ── RESULT HISTORY TABLE ─────────── */
.history-card {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
}
.htable { width: 100%; border-collapse: collapse; }
.htable th {
  font-size: 10px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 0 8px 12px;
  font-weight: 700;
  text-align: left;
}
.htable td {
  padding: 8px;
  border-bottom: 1px solid rgba(19,31,53,.7);
  font-size: 13px;
  vertical-align: middle;
}
.htable tr:last-child td { border-bottom: none; }
.htable tr:hover td { background: rgba(42,171,238,.03); }

/* number badge in table */
.num-badge {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--fH);
  font-size: 14px;
  font-weight: 800;
}
.num-badge.red    { background:linear-gradient(135deg,#ff3b5c,#ff6b35); color:#fff; }
.num-badge.green  { background:linear-gradient(135deg,#00d68f,#00b894); color:#000; }
.num-badge.violet { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; }
.num-badge.vio-red   { background:conic-gradient(#ff3b5c 0deg 180deg,#a855f7 180deg 360deg); color:#fff; }
.num-badge.vio-green { background:conic-gradient(#00d68f 0deg 180deg,#a855f7 180deg 360deg); color:#000; }

.period-short { font-size: 11px; color: var(--mu); }
.new-row td { animation: rowIn .4s ease; }
@keyframes rowIn { from{background:rgba(42,171,238,.08);} to{background:transparent;} }

/* ── STATS STRIP ──────────────────── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
}
.stat-val {
  font-family: var(--fH);
  font-size: 22px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 10px; color: var(--mu); text-transform: uppercase; letter-spacing: .07em; }

/* ── COLOUR DOTS STREAK ───────────── */
.streak-wrap {
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.dots-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.dot-c {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--fH);
  cursor: default;
  transition: transform .15s;
}
.dot-c:hover { transform: scale(1.15); }
.dot-c.red    { background:var(--red);   color:#fff; }
.dot-c.green  { background:var(--green); color:#000; }
.dot-c.violet { background:var(--vio);   color:#fff; }
.dot-c.vio-red { background:linear-gradient(135deg,#ff3b5c 50%,#a855f7 50%); color:#fff; }
.dot-c.vio-green { background:linear-gradient(135deg,#00d68f 50%,#a855f7 50%); color:#000; }

/* ── STATUS BAR ───────────────────── */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 12px;
  margin-bottom: 16px;
  font-size: 12px;
}
.status-left { display: flex; align-items: center; gap: 8px; }
.s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
.s-dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }
.status-right { color: var(--mu); font-size: 11px; }

/* ── LOADING ──────────────────────── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 16px;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(168,85,247,.2);
  border-top-color: var(--vio);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── ERROR ────────────────────────── */
.error-box {
  background: rgba(255,59,92,.07);
  border: 1px solid rgba(255,59,92,.25);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  color: var(--red);
  font-size: 13px;
  line-height: 1.7;
}

/* ── TABS ─────────────────────────── */
.tabs-row {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: var(--card);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 6px;
}
.tab-btn {
  flex: 1;
  padding: 8px 4px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--mu);
  font-family: var(--fH);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.tab-btn.on {
  background: var(--vio);
  color: #fff;
}

/* mobile */
@media(max-width:400px){
  .timer-num { font-size: 56px; }
  .big-ball { width: 66px; height: 66px; font-size: 34px; }
  .stats-strip { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">🎯</div>
      <div class="logo-text">Wingo Live</div>
    </div>
    <div class="header-sub">DKWIN · COLOR PREDICTION · REAL-TIME</div>
    <div class="live-badge"><div class="live-dot"></div> LIVE RESULT</div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="status-left">
      <div class="s-dot" id="s-dot"></div>
      <span id="s-txt" style="color:var(--tx);">Connecting...</span>
    </div>
    <div class="status-right" id="s-time">—</div>
  </div>

  <!-- TABS (future: 3min, 5min) -->
  <div class="tabs-row">
    <button class="tab-btn on" id="tab-1min" onclick="setType('1min',this)">⚡ Wingo 1 Min</button>
    <button class="tab-btn" id="tab-3min" onclick="setType('3min',this)">⏱ 3 Min</button>
    <button class="tab-btn" id="tab-5min" onclick="setType('5min',this)">🕐 5 Min</button>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-card">
    <div class="period-row">
      <div>
        <div class="period-label">Current Period</div>
        <div class="period-val" id="cur-period">Loading...</div>
      </div>
      <div class="source-tag" id="src-tag">dkwin.net</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-num" id="timer">--</div>
      <div class="timer-label">SECONDS REMAINING</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress" style="width:100%"></div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-strip" id="stats-strip">
    <div class="stat-box"><div class="stat-val" style="color:var(--red);" id="st-red">0</div><div class="stat-label">Red</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--green);" id="st-grn">0</div><div class="stat-label">Green</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--vio);" id="st-vio">0</div><div class="stat-label">Violet</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--gold);" id="st-tot">0</div><div class="stat-label">Total</div></div>
  </div>

  <!-- LATEST RESULT -->
  <div class="latest-card" id="latest-card">
    <div class="section-title">🏆 Latest Result</div>
    <div class="loading" id="latest-loading">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--mu);">Fetching result...</div>
    </div>
    <div id="latest-content" style="display:none;">
      <div class="latest-main">
        <div class="big-ball" id="big-ball">?</div>
        <div class="latest-info">
          <div class="latest-period" id="latest-period">Period: —</div>
          <div class="colour-pills" id="colour-pills"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- COLOUR STREAK -->
  <div class="streak-wrap" id="streak-wrap" style="display:none;">
    <div class="section-title">🎨 Last 20 Colours</div>
    <div class="dots-row" id="dots-row"></div>
  </div>

  <!-- HISTORY TABLE -->
  <div class="history-card" id="history-card" style="display:none;">
    <div class="section-title">📋 Result History</div>
    <table class="htable">
      <thead>
        <tr>
          <th>Period</th>
          <th>Number</th>
          <th>Colour</th>
          <th>Big/Small</th>
          <th>Odd/Even</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>

</div>

<script>
// ══ STATE ════════════════════════════════
let results     = [];
let curType     = '1min';
let timerSecs   = 60;
let totalSecs   = 60;
let countdownId = null;
let fetchId     = null;
let lastPeriod  = '';
let connected   = false;

const TYPE_SECS = { '1min': 60, '3min': 180, '5min': 300 };

// ══ HELPERS ══════════════════════════════
const $ = id => document.getElementById(id);

function getBallClass(colour) {
  if (!colour) return 'red';
  const c = colour.toLowerCase();
  if (c.includes('violet') && c.includes('red'))   return 'vio-red';
  if (c.includes('violet') && c.includes('green')) return 'vio-green';
  if (c.includes('red'))    return 'red';
  if (c.includes('green'))  return 'green';
  if (c.includes('violet')) return 'violet';
  return 'red';
}

function getColourLabel(colour) {
  if (!colour) return '?';
  const c = colour.toLowerCase();
  if (c.includes('violet') && c.includes('red'))   return ['Red', 'Violet'];
  if (c.includes('violet') && c.includes('green')) return ['Green', 'Violet'];
  if (c.includes('red'))    return ['Red'];
  if (c.includes('green'))  return ['Green'];
  if (c.includes('violet')) return ['Violet'];
  return [colour];
}

function getPillClass(label) {
  const l = label.toLowerCase();
  if (l === 'red')    return 'red';
  if (l === 'green')  return 'green';
  if (l === 'violet') return 'violet';
  if (l === 'big')    return 'big';
  if (l === 'small')  return 'small';
  if (l === 'odd')    return 'odd';
  if (l === 'even')   return 'even';
  return '';
}

function shortPeriod(p) {
  if (!p) return '—';
  return p.length > 8 ? '...' + p.slice(-6) : p;
}

function fmtTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
  catch(e) { return iso; }
}

// ══ FETCH ════════════════════════════════
async function fetchResults() {
  try {
    const r = await fetch(`/api/wingo?type=${curType}&limit=30&_t=${Date.now()}`);
    const d = await r.json();

    if (!d.ok || !d.results?.length) {
      setStatus(false, d.error || 'No data');
      return;
    }

    setStatus(true, 'Connected · dkwin.net');
    $('s-time').textContent = 'Updated ' + fmtTime(d.fetchedAt);
    $('src-tag').textContent = (d.source || 'dkwin.net').replace('https://','');

    // Update secsLeft if server provided it
    if (d.secsLeft && Math.abs(d.secsLeft - timerSecs) > 3) {
      timerSecs = d.secsLeft;
    }

    // Check if new result arrived
    const latest = d.results[0];
    if (latest && latest.period !== lastPeriod) {
      lastPeriod = latest.period;
      results = d.results;
      renderLatest(latest);
      renderStreak();
      renderHistory();
      renderStats();
      // Update period display
      $('cur-period').textContent = d.results[1]?.period
        ? 'Next: ' + shortPeriod(d.results[0]?.period)
        : shortPeriod(latest.period);
    }

  } catch(e) {
    setStatus(false, 'Fetch error: ' + e.message);
  }
}

// ══ RENDER ═══════════════════════════════
function renderLatest(r) {
  $('latest-loading').style.display = 'none';
  $('latest-content').style.display = 'block';

  const ballClass = getBallClass(r.colour);
  const ball = $('big-ball');
  ball.textContent = r.number;
  ball.className = 'big-ball ' + ballClass;
  // re-trigger animation
  ball.style.animation = 'none';
  ball.offsetHeight;
  ball.style.animation = '';

  $('latest-period').textContent = 'Period: ' + shortPeriod(r.period);

  const labels = getColourLabel(r.colour);
  const bs     = r.bigSmall || (parseInt(r.number) >= 5 ? 'Big' : 'Small');
  const oe     = parseInt(r.number) % 2 === 0 ? 'Even' : 'Odd';

  const allPills = [...labels, bs, oe];
  $('colour-pills').innerHTML = allPills
    .map(l => `<div class="pill ${getPillClass(l)}">${l}</div>`)
    .join('');
}

function renderHistory() {
  $('history-card').style.display = 'block';
  const body = $('history-body');
  body.innerHTML = results.map((r, i) => {
    const ballClass = getBallClass(r.colour);
    const labels    = getColourLabel(r.colour).join(' + ');
    const bs        = r.bigSmall || (parseInt(r.number) >= 5 ? 'Big' : 'Small');
    const oe        = parseInt(r.number) % 2 === 0 ? 'Even' : 'Odd';
    const newCls    = i === 0 ? 'new-row' : '';
    return `<tr class="${newCls}">
      <td><span class="period-short">${shortPeriod(r.period)}</span></td>
      <td><div class="num-badge ${ballClass}">${r.number}</div></td>
      <td style="color:var(--mu);font-size:12px;">${labels}</td>
      <td><div class="pill ${getPillClass(bs)}" style="display:inline-flex;">${bs}</div></td>
      <td><div class="pill ${getPillClass(oe)}" style="display:inline-flex;">${oe}</div></td>
    </tr>`;
  }).join('');
}

function renderStreak() {
  $('streak-wrap').style.display = 'block';
  const last20 = results.slice(0, 20);
  $('dots-row').innerHTML = last20.map(r => {
    const cls = getBallClass(r.colour);
    return `<div class="dot-c ${cls}" title="Period: ${shortPeriod(r.period)}">${r.number}</div>`;
  }).join('');
}

function renderStats() {
  const last20 = results.slice(0, 20);
  let red = 0, grn = 0, vio = 0;
  last20.forEach(r => {
    const c = (r.colour || '').toLowerCase();
    if (c.includes('red'))    red++;
    if (c.includes('green'))  grn++;
    if (c.includes('violet')) vio++;
  });
  $('st-red').textContent = red;
  $('st-grn').textContent = grn;
  $('st-vio').textContent = vio;
  $('st-tot').textContent = last20.length;
}

function setStatus(ok, msg) {
  connected = ok;
  $('s-dot').className = 's-dot' + (ok ? '' : ' err');
  $('s-txt').textContent = msg;
  $('s-txt').style.color = ok ? 'var(--green)' : 'var(--red)';
}

// ══ COUNTDOWN TIMER ═══════════════════════
function startCountdown() {
  if (countdownId) clearInterval(countdownId);
  totalSecs = TYPE_SECS[curType] || 60;

  // Initial fetch to get secsLeft from server
  fetchResults();

  countdownId = setInterval(() => {
    timerSecs = Math.max(0, timerSecs - 1);

    const t = $('timer');
    t.textContent = String(timerSecs).padStart(2, '0');
    t.className = 'timer-num' + (timerSecs <= 10 ? ' urgent' : '');

    const pct = (timerSecs / totalSecs) * 100;
    const prog = $('progress');
    prog.style.width = pct + '%';
    prog.className = 'progress-fill' + (timerSecs <= 10 ? ' urgent' : '');

    // When timer hits 0 — fetch new result
    if (timerSecs <= 0) {
      timerSecs = totalSecs;
      setTimeout(fetchResults, 2000); // wait 2s for result to be published
    }

  }, 1000);
}

// Also poll every 8 seconds to sync
function startPolling() {
  if (fetchId) clearInterval(fetchId);
  fetchId = setInterval(fetchResults, 8000);
}

// ══ TYPE SWITCH ═══════════════════════════
function setType(type, el) {
  curType = type;
  timerSecs = TYPE_SECS[type] || 60;
  totalSecs = timerSecs;
  lastPeriod = '';
  results = [];

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');

  // Reset UI
  $('latest-loading').style.display = 'flex';
  $('latest-content').style.display = 'none';
  $('history-card').style.display = 'none';
  $('streak-wrap').style.display = 'none';
  $('history-body').innerHTML = '';
  $('dots-row').innerHTML = '';
  $('cur-period').textContent = 'Loading...';
  setStatus(false, 'Switching...');

  startCountdown();
  startPolling();
}

// ══ INIT ══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  startCountdown();
  startPolling();
});

// Page visibility — resume when tab becomes active
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    fetchResults();
  }
});
</script>
</body>
</html>
